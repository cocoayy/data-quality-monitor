version: "3.9"

services:
  db:
    image: postgres:16
    container_name: data-quality-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: data_quality_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: